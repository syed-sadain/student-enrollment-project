<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .card {
            width: 480px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #4c5ef5, #667eea);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .card-body {
            padding: 30px;
        }

        label {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-custom {
            height: 48px;
            font-weight: 600;
            border-radius: 10px;
            margin-top: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #34d16e);
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff, #5e9cf0);
            border: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #f06a7a);
            border: none;
        }

        #msg {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h3 class="form-title">Student Enrollment Form</h3>
    </div>
    <div class="card-body">
        <form id="enrollmentForm">
            
            <div class="mb-3">
                <label for="roll_no">Roll Number <span class="text-danger">*</span></label>
                <input type="text" id="roll_no" class="form-control" placeholder="Enter Roll No">
            </div>

            <div class="mb-3">
                <label for="full_name">Full Name <span class="text-danger">*</span></label>
                <input type="text" id="full_name" class="form-control" placeholder="Enter Full Name">
            </div>

            <div class="mb-3">
                <label for="class">Class <span class="text-danger">*</span></label>
                <input type="text" id="class" class="form-control" placeholder="Enter Class (e.g. 10th, 11th Science)">
            </div>

            <div class="mb-3">
                <label for="birth_date">Date of Birth <span class="text-danger">*</span></label>
                <input type="date" id="birth_date" class="form-control">
            </div>

            <div class="mb-3">
                <label for="address">Address <span class="text-danger">*</span></label>
                <textarea id="address" class="form-control" rows="3" placeholder="Enter Full Address"></textarea>
            </div>

            <div class="mb-4">
                <label for="enrollment_date">Enrollment Date <span class="text-danger">*</span></label>
                <input type="date" id="enrollment_date" class="form-control">
            </div>

            <button type="button" onclick="saveData()" id="saveBtn" class="btn btn-success btn-custom">
                Save Student
            </button>

            <button type="button" onclick="updateData()" id="updateBtn" class="btn btn-primary btn-custom" style="display:none;">
                Update Student
            </button>

            <button type="button" onclick="resetForm()" class="btn btn-danger btn-custom">
                Reset Form
            </button>
        </form>

        <p id="msg" class="text-center mt-3"></p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
